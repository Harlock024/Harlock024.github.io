<!DOCTYPE html>
<html>
<title>Calculadora</title>


<body>

    <div class="calculadora">


        <div class="display">0</div>

        <button class="button-54" id="pow" role="button">^</button>
        <button class="button-54" id="sqrt" role="button">√</button>
        <button class="button-54" id="C" role="button">C</button>
        <button class="button-54" id="back" role="button">🡨</button>
        <button class="button-54" id="div" role="button">/</button>
        <button class="button-54" id="num" role="button">7</button>
        <button class="button-54" id="num" role="button">8</button>
        <button class="button-54" id="num" role="button">9</button>
        <button class="button-54" id="multi" role="button">*</button>
        <button class="button-54" id="num" role="button">4</button>
        <button class="button-54" id="num" role="button">5</button>
        <button class="button-54" id="num" role="button">6</button>
        <button class="button-54" id="num" role="button">+</button>
        <button class="button-54" id="num" role="button">1</button>
        <button class="button-54" id="num" role="button">2</button>
        <button class="button-54" id="num" role="button">3</button>
        <button class="button-54" id="menos" role="button">-</button>

        <button class="button-54" id="igual" role="button">=</button>
        <button class="button-54" id="cero" role="button">0</button>
        <button class="button-54" id="punto" role="button">.</button>



    </div>
    <script src="math.js"></script>
    <link rel="stylesheet" href="style.css">

</body>

</html>
